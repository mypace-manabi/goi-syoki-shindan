function ev(s){return s>=9?"◎":s>=7?"○":"△"}
function at(e){return e==="◎"||e==="○"} function db(e){return e==="◎"}
function calc(){const rows=qs.map((q,i)=>{const a=ans[i], ok=a===q.correct;return {q,answerIndex:a,answer:a?q.options[a-1]:"-",correct:q.options[q.correct-1],ok,pt:ok?1:0}});const total=rows.reduce((s,r)=>s+r.pt,0);const blocks=[];for(let b=0;b<5;b++){const sc=rows.slice(b*10,b*10+10).reduce((s,r)=>s+r.pt,0);blocks.push({range:`${b*10+1}〜${b*10+10}`,label:`小${b+2}相当`,score:sc,eval:ev(sc)})};const e=blocks.map(b=>b.eval);let g="A";if(at(e[0])&&at(e[1]))g="B";if(db(e[0])&&at(e[1])&&at(e[2]))g="C";if(db(e[0])&&db(e[1])&&db(e[2])&&at(e[3]))g="D";if(db(e[0])&&db(e[1])&&db(e[2])&&db(e[3])&&at(e[4]))g="E";if(e.every(db))g="F";return {rows,total,blocks,grade:g}}
function showResult(sw=true){const r=calc();total.textContent=r.total;grade.textContent=r.grade;subs.innerHTML="<tr><th>問題番号</th><th>学年相当</th><th>得点</th><th>評価</th></tr>"+r.blocks.map(b=>`<tr><td>${b.range}</td><td>${b.label}</td><td>${b.score}/10</td><td>${b.eval}</td></tr>`).join("");list.innerHTML='<tr><th>No.</th><th>正誤</th><th>あなたの解答</th><th>正解</th><th>得点</th><th class="ph">復習</th></tr>'+r.rows.map((x,i)=>`<tr><td>${i+1}</td><td class="center ${x.ok?"ok":"ng"}">${x.ok?"○":"×"}</td><td>${x.answer}</td><td>${x.correct}</td><td>${x.pt}/1</td><td class="ph"><button class="link" onclick="review(${i})">復習</button></td></tr>`).join("");if(sw)screen("resultScreen")}
function backQ(){showQ();screen("questionScreen")}
function review(i){const r=calc().rows[i], q=r.q;rreading.textContent=q.reading||"";rterm.innerHTML=withRuby(q.term);rchoices.innerHTML="";q.options.forEach((o,j)=>{const n=j+1,d=document.createElement("div");d.className="choice";if(n===q.correct)d.classList.add("good");if(n===r.answerIndex&&n!==q.correct)d.classList.add("bad");d.textContent=`○ ${o}${n===q.correct?"　正解":n===r.answerIndex?"　あなたの解答":""}`;rchoices.appendChild(d)});rmeta.innerHTML=`あなたの解答：${r.answer}<br>正解：${r.correct}<br>得点：${r.pt}/1`;screen("reviewScreen")}
</script></body></html>
